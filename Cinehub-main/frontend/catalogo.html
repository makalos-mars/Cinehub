<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineHub — Catálogo</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --red: #e53935;
      --red-dark: #b71c1c;
      --red-glow: rgba(229,57,53,0.3);
      --bg: #0a0a0b;
      --bg2: #111114;
      --surface: #1c1c20;
      --surface2: #26262b;
      --border: rgba(255,255,255,0.08);
      --text: #f0ede8;
      --muted: #8a8793;
      --blue: #42a5f5;
      --green: #66bb6a;
    }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
    }

    /* ── NAVBAR ── */
    .navbar {
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 5%;
      height: 64px;
      background: rgba(10,10,11,0.96);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
    }

    .nav-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-icon {
      width: 32px; height: 32px;
      background: var(--red);
      border-radius: 7px;
      display: grid;
      place-items: center;
      box-shadow: 0 0 14px var(--red-glow);
    }

    .logo-icon svg { width: 18px; height: 18px; fill: white; }

    .logo-text {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 22px;
      letter-spacing: 1.5px;
      color: var(--text);
    }

    .logo-text span { color: var(--red); }

    .nav-back {
      color: var(--muted);
      text-decoration: none;
      font-size: 13px;
      font-weight: 500;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: color 0.2s;
    }

    .nav-back:hover { color: var(--text); }

    /* ── TYPE SWITCHER ── */
    .type-bar {
      display: flex;
      gap: 0;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 4px;
      margin: 28px 5% 0;
    }

    .type-btn {
      flex: 1;
      background: none;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 10px 20px;
      border-radius: 7px;
      cursor: pointer;
      transition: all 0.22s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .type-btn.active {
      color: white;
    }

    .type-btn.active[data-tipo="pelicula"]   { background: var(--red);   box-shadow: 0 3px 14px var(--red-glow); }
    .type-btn.active[data-tipo="documental"] { background: var(--blue);  box-shadow: 0 3px 14px rgba(66,165,245,0.3); }
    .type-btn.active[data-tipo="serie"]      { background: var(--green); box-shadow: 0 3px 14px rgba(102,187,106,0.3); }

    .type-btn:not(.active):hover { color: var(--text); background: var(--surface2); }

    /* ── LAYOUT PRINCIPAL ── */
    .page-layout {
      display: grid;
      grid-template-columns: 1fr 380px;
      gap: 28px;
      padding: 28px 5% 60px;
      align-items: start;
    }

    @media (max-width: 1024px) {
      .page-layout { grid-template-columns: 1fr; }
      .form-panel  { order: -1; }
    }

    /* ── PANEL IZQUIERDO: LISTA ── */
    .list-panel {}

    .list-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
      gap: 12px;
    }

    .panel-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 30px;
      letter-spacing: 1px;
    }

    .search-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 8px 14px;
      width: 260px;
    }

    .search-bar svg { width: 15px; height: 15px; color: var(--muted); flex-shrink: 0; }
    .search-bar input {
      background: none; border: none; outline: none;
      color: var(--text); font-size: 13px; width: 100%;
    }

    /* ── TABLA ── */
    .table-wrap {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
    }

    .data-table {
      width: 100%;
      border-collapse: collapse;
    }

    .data-table th {
      background: rgba(0,0,0,0.25);
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--muted);
      padding: 14px 16px;
      text-align: left;
    }

    .data-table td {
      font-size: 13px;
      color: var(--text);
      padding: 13px 16px;
      border-top: 1px solid var(--border);
      vertical-align: middle;
    }

    .data-table tbody tr {
      transition: background 0.15s;
    }

    .data-table tbody tr:hover {
      background: var(--surface2);
    }

    .cell-title {
      font-weight: 600;
      max-width: 200px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .type-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      padding: 2px 7px;
      border-radius: 4px;
    }

    .badge-pelicula   { background: rgba(229,57,53,0.18); color: #ff6b6b; }
    .badge-documental { background: rgba(66,165,245,0.18); color: #64b5f6; }
    .badge-serie      { background: rgba(102,187,106,0.18); color: #81c784; }

    .btn-actions {
      display: flex;
      gap: 6px;
    }

    .btn-edit, .btn-del {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-size: 12px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'DM Sans', sans-serif;
    }

    .btn-edit:hover { color: var(--text); border-color: rgba(255,255,255,0.2); background: var(--surface2); }
    .btn-del:hover  { color: #ff6b6b; border-color: rgba(229,57,53,0.4); background: rgba(229,57,53,0.08); }

    .table-empty {
      padding: 60px;
      text-align: center;
      color: var(--muted);
    }

    .table-empty svg {
      width: 40px;
      height: 40px;
      opacity: 0.25;
      margin-bottom: 12px;
      display: block;
      margin-left: auto;
      margin-right: auto;
    }

    /* ── PAGINACIÓN ── */
    .pagination {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 16px;
      border-top: 1px solid var(--border);
      font-size: 13px;
      color: var(--muted);
    }

    .page-btns {
      display: flex;
      gap: 4px;
    }

    .page-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 600;
      padding: 5px 10px;
      border-radius: 5px;
      cursor: pointer;
      transition: all 0.15s;
    }

    .page-btn:hover, .page-btn.active {
      color: var(--text);
      border-color: rgba(255,255,255,0.2);
      background: var(--surface2);
    }

    .page-btn:disabled { opacity: 0.3; cursor: not-allowed; }

    /* ── SPINNER ── */
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid rgba(229,57,53,0.15);
      border-top-color: var(--red);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 60px auto;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── PANEL DERECHO: FORMULARIO ── */
    .form-panel {
      position: sticky;
      top: 80px;
    }

    .form-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      overflow: hidden;
    }

    .form-card-header {
      padding: 20px 22px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .form-card-title {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 20px;
      letter-spacing: 1px;
    }

    .form-mode-badge {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 3px 9px;
      border-radius: 4px;
    }

    .mode-create { background: rgba(102,187,106,0.2); color: #81c784; }
    .mode-edit   { background: rgba(255,167,38,0.2);  color: #ffb74d; }

    .form-body {
      padding: 20px 22px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .form-label {
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--muted);
    }

    .form-input, .form-select, .form-textarea {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 10px 13px;
      outline: none;
      transition: border-color 0.18s, box-shadow 0.18s;
      width: 100%;
    }

    .form-input:focus, .form-select:focus, .form-textarea:focus {
      border-color: rgba(229,57,53,0.5);
      box-shadow: 0 0 0 3px rgba(229,57,53,0.08);
    }

    .form-textarea { resize: vertical; min-height: 80px; }

    .form-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
    }

    .form-footer {
      padding: 16px 22px;
      border-top: 1px solid var(--border);
      display: flex;
      gap: 8px;
    }

    .btn-submit {
      flex: 1;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 11px;
      cursor: pointer;
      transition: background 0.18s, transform 0.12s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
    }

    .btn-submit:hover  { background: #f44336; transform: translateY(-1px); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .btn-cancel {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 600;
      padding: 11px 16px;
      cursor: pointer;
      transition: all 0.18s;
    }

    .btn-cancel:hover { color: var(--text); border-color: rgba(255,255,255,0.2); background: var(--surface2); }

    /* ── TOAST ── */
    .toast-container {
      position: fixed;
      bottom: 28px;
      right: 28px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      z-index: 9999;
    }

    .toast {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-left: 3px solid var(--green);
      border-radius: 10px;
      padding: 13px 18px;
      font-size: 13px;
      font-weight: 500;
      color: var(--text);
      max-width: 320px;
      box-shadow: 0 8px 30px rgba(0,0,0,0.5);
      animation: slideIn 0.3s ease;
    }

    .toast.error { border-left-color: var(--red); }

    @keyframes slideIn {
      from { transform: translateX(30px); opacity: 0; }
      to   { transform: translateX(0);    opacity: 1; }
    }

    /* ── MODAL DE CONFIRMACIÓN ── */
    .confirm-overlay {
      position: fixed;
      inset: 0;
      z-index: 500;
      background: rgba(0,0,0,0.8);
      backdrop-filter: blur(10px);
      display: none;
      align-items: center;
      justify-content: center;
    }

    .confirm-overlay.open { display: flex; }

    .confirm-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 32px 28px;
      max-width: 360px;
      width: 90%;
      text-align: center;
    }

    .confirm-icon { font-size: 42px; margin-bottom: 14px; }
    .confirm-title { font-family: 'Bebas Neue', sans-serif; font-size: 26px; margin-bottom: 8px; }
    .confirm-desc  { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }

    .confirm-actions { display: flex; gap: 10px; }
    .btn-confirm-del {
      flex: 1;
      background: var(--red);
      color: white;
      border: none;
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 700;
      padding: 11px;
      cursor: pointer;
      transition: background 0.18s;
    }
    .btn-confirm-del:hover { background: #f44336; }
    .btn-confirm-cancel {
      flex: 1;
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 600;
      padding: 11px;
      cursor: pointer;
      transition: all 0.18s;
    }
    .btn-confirm-cancel:hover { color: var(--text); background: var(--surface2); }
  </style>
</head>
<body>

  <!-- NAVBAR -->
  <nav class="navbar">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24"><path d="M4 4h3l2 4H4zm4 0h4l2 4h-4zm5 0h3l2 4h-3zM2 9h20v11a2 2 0 01-2 2H4a2 2 0 01-2-2V9zm10 3l-5 3v-6l5 3z"/></svg>
      </div>
      <span class="logo-text">Cine<span>Hub</span></span>
    </a>
    <a href="index.html" class="nav-back">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
      Volver al inicio
    </a>
  </nav>

  <!-- SELECTOR DE TIPO -->
  <div class="type-bar">
    <button class="type-btn" data-tipo="pelicula">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h3l2 4H4zm4 0h4l2 4h-4zm5 0h3l2 4h-3zM2 9h20v11a2 2 0 01-2 2H4a2 2 0 01-2-2V9z"/></svg>
      Películas
    </button>
    <button class="type-btn" data-tipo="documental">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M4 6H2v14c0 1.1.9 2 2 2h14v-2H4V6zm16-4H8c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h12c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zm-8 12.5v-9l6 4.5-6 4.5z"/></svg>
      Documentales
    </button>
    <button class="type-btn" data-tipo="serie">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor"><path d="M21 3H3c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h5v2h8v-2h5c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm0 14H3V5h18v12z"/></svg>
      Series
    </button>
  </div>

  <!-- LAYOUT PRINCIPAL -->
  <div class="page-layout">

    <!-- LISTA -->
    <div class="list-panel">
      <div class="list-header">
        <h1 class="panel-title" id="listTitle">Catálogo</h1>
        <div class="search-bar">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
          <input type="text" placeholder="Buscar..." id="searchInput" />
        </div>
      </div>

      <div class="table-wrap">
        <div id="tableContent">
          <div class="spinner"></div>
        </div>
        <div class="pagination" id="paginationBar" style="display:none;">
          <span id="pageInfo"></span>
          <div class="page-btns">
            <button class="page-btn" id="btnPrev">‹ Anterior</button>
            <button class="page-btn" id="btnNext">Siguiente ›</button>
          </div>
        </div>
      </div>
    </div>

    <!-- FORMULARIO -->
    <div class="form-panel">
      <div class="form-card">
        <div class="form-card-header">
          <span class="form-card-title" id="formTitle">Nuevo registro</span>
          <span class="form-mode-badge mode-create" id="formModeBadge">Alta</span>
        </div>

        <div class="form-body">
          <input type="hidden" id="editingId" value="" />

          <div class="form-group">
            <label class="form-label">Título *</label>
            <input type="text" class="form-input" id="fTitulo" placeholder="Título del registro" />
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Género *</label>
              <select class="form-select" id="fGenero">
                <option value="">Selecciona...</option>
                <option>Acción</option>
                <option>Aventura</option>
                <option>Comedia</option>
                <option>Drama</option>
                <option>Thriller</option>
                <option>Terror</option>
                <option>Ciencia Ficción</option>
                <option>Romance</option>
                <option>Animación</option>
                <option>Documental</option>
                <option>Histórico</option>
                <option>Musical</option>
                <option>Biográfico</option>
                <option>Misterio</option>
                <option>Otro</option>
              </select>
            </div>
            <div class="form-group">
              <label class="form-label">Tipo *</label>
              <select class="form-select" id="fTipo">
                <option value="pelicula">Película</option>
                <option value="documental">Documental</option>
                <option value="serie">Serie</option>
              </select>
            </div>
          </div>

          <div class="form-row">
            <div class="form-group">
              <label class="form-label">Año</label>
              <input type="number" class="form-input" id="fAnio" placeholder="2024" min="1900" max="2100" />
            </div>
            <div class="form-group">
              <label class="form-label">Duración (min)</label>
              <input type="number" class="form-input" id="fDuracion" placeholder="120" min="1" />
            </div>
          </div>

          <div class="form-group">
            <label class="form-label">URL de imagen (póster)</label>
            <input type="url" class="form-input" id="fImagen" placeholder="https://..." />
          </div>

          <div class="form-group">
            <label class="form-label">Producción (director)</label>
            <select class="form-select" id="fProduccion">
              <option value="">Sin asignar</option>
            </select>
          </div>

          <div class="form-group">
            <label class="form-label">Sinopsis</label>
            <textarea class="form-textarea" id="fSinopsis" placeholder="Descripción breve..."></textarea>
          </div>
        </div>

        <div class="form-footer">
          <button class="btn-cancel" id="btnCancel" style="display:none;">Cancelar</button>
          <button class="btn-submit" id="btnSubmit">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="currentColor"><path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/></svg>
            <span id="btnSubmitText">Guardar registro</span>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- MODAL CONFIRM DELETE -->
  <div class="confirm-overlay" id="confirmOverlay">
    <div class="confirm-card">
      <div class="confirm-icon">🗑️</div>
      <h3 class="confirm-title">Eliminar registro</h3>
      <p class="confirm-desc" id="confirmDesc">¿Seguro que deseas eliminar este registro? Esta acción no se puede deshacer.</p>
      <div class="confirm-actions">
        <button class="btn-confirm-cancel" id="btnConfirmCancel">Cancelar</button>
        <button class="btn-confirm-del" id="btnConfirmDel">Sí, eliminar</button>
      </div>
    </div>
  </div>

  <!-- TOASTS -->
  <div class="toast-container" id="toastContainer"></div>

  <script>
    const API = 'http://localhost:8000';

    // ── Estado ──
    let currentTipo   = 'pelicula';
    let allItems      = [];
    let filteredItems = [];
    let editingId     = null;
    let deleteId      = null;
    let page          = 1;
    const PAGE_SIZE   = 15;

    // ── Leer query param ──
    const urlParams = new URLSearchParams(window.location.search);
    const paramTipo = urlParams.get('tipo');
    if (paramTipo && ['pelicula','documental','serie'].includes(paramTipo)) {
      currentTipo = paramTipo;
    }

    // ── Etiquetas por tipo ──
    const TYPE_LABELS = {
      pelicula: { plural: 'Películas', singular: 'Película', color: 'red' },
      documental: { plural: 'Documentales', singular: 'Documental', color: 'blue' },
      serie: { plural: 'Series', singular: 'Serie', color: 'green' },
    };

    // ── Toast ──
    function toast(msg, type = 'ok') {
      const div = document.createElement('div');
      div.className = 'toast' + (type === 'error' ? ' error' : '');
      div.textContent = msg;
      document.getElementById('toastContainer').appendChild(div);
      setTimeout(() => div.remove(), 3500);
    }

    // ── Activar tab ──
    function setActiveTipo(tipo) {
      currentTipo = tipo;
      page = 1;
      document.querySelectorAll('.type-btn').forEach(b => {
        b.classList.toggle('active', b.dataset.tipo === tipo);
      });
      document.getElementById('listTitle').textContent = TYPE_LABELS[tipo]?.plural || tipo;
      document.getElementById('fTipo').value = tipo;
      clearForm();
      loadItems();
    }

    // ── Cargar producciones ──
    async function loadProducciones() {
      try {
        const res = await fetch(`${API}/api/producciones`);
        const data = await res.json();
        const sel = document.getElementById('fProduccion');
        sel.innerHTML = '<option value="">Sin asignar</option>';
        (Array.isArray(data) ? data : []).forEach(p => {
          sel.innerHTML += `<option value="${p.id_produccion}">${p.director}</option>`;
        });
      } catch(e) { /* silencioso */ }
    }

    // ── Cargar items ──
    async function loadItems() {
      document.getElementById('tableContent').innerHTML = '<div class="spinner"></div>';
      document.getElementById('paginationBar').style.display = 'none';

      try {
        const res = await fetch(`${API}/api/catalogo?tipo=${currentTipo}`);
        const data = await res.json();

        if (data.error) throw new Error(data.error);
        allItems = Array.isArray(data) ? data : [];
        filteredItems = [...allItems];
        renderTable();
      } catch(e) {
        document.getElementById('tableContent').innerHTML = `
          <div class="table-empty">
            <p style="color:var(--red);">Error de conexión: ${e.message}</p>
          </div>`;
      }
    }

    // ── Filtrar ──
    function filterItems(q) {
      const query = q.toLowerCase();
      filteredItems = q
        ? allItems.filter(i => i.titulo.toLowerCase().includes(query) || (i.genero || '').toLowerCase().includes(query))
        : [...allItems];
      page = 1;
      renderTable();
    }

    // ── Render tabla ──
    function renderTable() {
      const total = filteredItems.length;
      const start = (page - 1) * PAGE_SIZE;
      const end   = Math.min(start + PAGE_SIZE, total);
      const items = filteredItems.slice(start, end);

      if (!items.length) {
        document.getElementById('tableContent').innerHTML = `
          <div class="table-empty">
            <svg viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h3l2 4H4zm4 0h4l2 4h-4zm5 0h3l2 4h-3zM2 9h20v11a2 2 0 01-2 2H4a2 2 0 01-2-2V9z"/></svg>
            <p>No hay ${TYPE_LABELS[currentTipo]?.plural?.toLowerCase() || 'registros'} en la base de datos.</p>
            <p style="font-size:12px; margin-top:6px;">Usa el formulario para agregar uno.</p>
          </div>`;
        document.getElementById('paginationBar').style.display = 'none';
        return;
      }

      const type = TYPE_LABELS[currentTipo];
      let html = `
        <table class="data-table">
          <thead>
            <tr>
              <th>Título</th>
              <th>Género</th>
              <th>Año</th>
              <th>Director</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody>`;

      items.forEach(item => {
        html += `
          <tr>
            <td>
              <div class="cell-title" title="${item.titulo}">${item.titulo}</div>
              <span class="type-badge badge-${item.tipo}">${type?.singular || item.tipo}</span>
            </td>
            <td>${item.genero || '—'}</td>
            <td>${item.anio || '—'}</td>
            <td>${item.director || '—'}</td>
            <td>
              <div class="btn-actions">
                <button class="btn-edit" onclick="startEdit(${item.id_pelicula})">Editar</button>
                <button class="btn-del"  onclick="startDelete(${item.id_pelicula}, '${item.titulo.replace(/'/g,"\\'")}')">Eliminar</button>
              </div>
            </td>
          </tr>`;
      });

      html += '</tbody></table>';
      document.getElementById('tableContent').innerHTML = html;

      // Paginación
      const pagBar = document.getElementById('paginationBar');
      if (total > PAGE_SIZE) {
        pagBar.style.display = 'flex';
        document.getElementById('pageInfo').textContent = `${start+1}–${end} de ${total}`;
        document.getElementById('btnPrev').disabled = page === 1;
        document.getElementById('btnNext').disabled = end >= total;
      } else {
        pagBar.style.display = total > 0 ? 'flex' : 'none';
        document.getElementById('pageInfo').textContent = `${total} registro${total !== 1 ? 's' : ''}`;
        document.getElementById('btnPrev').style.display = 'none';
        document.getElementById('btnNext').style.display = 'none';
      }
    }

    // ── Formulario ──
    function clearForm() {
      editingId = null;
      document.getElementById('editingId').value = '';
      document.getElementById('fTitulo').value   = '';
      document.getElementById('fGenero').value   = '';
      document.getElementById('fTipo').value     = currentTipo;
      document.getElementById('fAnio').value     = '';
      document.getElementById('fDuracion').value = '';
      document.getElementById('fImagen').value   = '';
      document.getElementById('fSinopsis').value = '';
      document.getElementById('fProduccion').value = '';

      document.getElementById('formTitle').textContent        = 'Nuevo registro';
      document.getElementById('formModeBadge').textContent    = 'Alta';
      document.getElementById('formModeBadge').className      = 'form-mode-badge mode-create';
      document.getElementById('btnSubmitText').textContent    = 'Guardar registro';
      document.getElementById('btnCancel').style.display      = 'none';
    }

    function startEdit(id) {
      const item = allItems.find(i => i.id_pelicula === id);
      if (!item) return;

      editingId = id;
      document.getElementById('editingId').value      = id;
      document.getElementById('fTitulo').value        = item.titulo || '';
      document.getElementById('fGenero').value        = item.genero || '';
      document.getElementById('fTipo').value          = item.tipo   || currentTipo;
      document.getElementById('fAnio').value          = item.anio   || '';
      document.getElementById('fDuracion').value      = item.duracion || '';
      document.getElementById('fImagen').value        = item.imagen_url || '';
      document.getElementById('fSinopsis').value      = item.sinopsis || '';
      document.getElementById('fProduccion').value    = item.id_produccion || '';

      document.getElementById('formTitle').textContent     = 'Editar registro';
      document.getElementById('formModeBadge').textContent = 'Modificación';
      document.getElementById('formModeBadge').className   = 'form-mode-badge mode-edit';
      document.getElementById('btnSubmitText').textContent = 'Guardar cambios';
      document.getElementById('btnCancel').style.display   = 'inline-flex';

      // Scroll al formulario en móvil
      document.querySelector('.form-panel').scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    function startDelete(id, titulo) {
      deleteId = id;
      document.getElementById('confirmDesc').textContent = `¿Seguro que deseas eliminar "${titulo}"? Esta acción borrará también su cartelera y no se puede deshacer.`;
      document.getElementById('confirmOverlay').classList.add('open');
    }

    // ── Submit ──
    document.getElementById('btnSubmit').addEventListener('click', async () => {
      const titulo   = document.getElementById('fTitulo').value.trim();
      const genero   = document.getElementById('fGenero').value;
      const tipo     = document.getElementById('fTipo').value;
      const anio     = document.getElementById('fAnio').value;
      const duracion = document.getElementById('fDuracion').value;
      const imagen   = document.getElementById('fImagen').value.trim();
      const sinopsis = document.getElementById('fSinopsis').value.trim();
      const prod     = document.getElementById('fProduccion').value;

      if (!titulo) { toast('El título es obligatorio.', 'error'); return; }
      if (!genero) { toast('Selecciona un género.', 'error'); return; }

      const payload = {
        titulo,
        genero,
        tipo,
        anio:         anio     ? parseInt(anio)     : null,
        duracion:     duracion ? parseInt(duracion) : null,
        imagen_url:   imagen   || null,
        sinopsis:     sinopsis || null,
        id_produccion: prod    ? parseInt(prod)     : null,
      };

      const btn = document.getElementById('btnSubmit');
      btn.disabled = true;

      try {
        let res, data;
        if (editingId) {
          // Modificación
          res  = await fetch(`${API}/api/catalogo/${editingId}`, {
            method: 'PUT',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        } else {
          // Alta
          res  = await fetch(`${API}/api/catalogo`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload)
          });
        }

        data = await res.json();

        if (!data.ok) {
          toast(data.mensaje || 'Error al guardar.', 'error');
        } else {
          toast(data.mensaje || 'Guardado correctamente.', 'ok');
          clearForm();
          loadItems();
        }
      } catch(e) {
        toast('No se pudo conectar con el servidor.', 'error');
      } finally {
        btn.disabled = false;
      }
    });

    // ── Cancel edit ──
    document.getElementById('btnCancel').addEventListener('click', clearForm);

    // ── Confirm delete ──
    document.getElementById('btnConfirmDel').addEventListener('click', async () => {
      if (!deleteId) return;
      document.getElementById('confirmOverlay').classList.remove('open');

      try {
        const res  = await fetch(`${API}/api/catalogo/${deleteId}`, { method: 'DELETE' });
        const data = await res.json();
        if (!data.ok) {
          toast(data.mensaje || 'Error al eliminar.', 'error');
        } else {
          toast(data.mensaje || 'Eliminado correctamente.', 'ok');
          if (editingId === deleteId) clearForm();
          loadItems();
        }
      } catch(e) {
        toast('No se pudo conectar con el servidor.', 'error');
      }

      deleteId = null;
    });

    document.getElementById('btnConfirmCancel').addEventListener('click', () => {
      document.getElementById('confirmOverlay').classList.remove('open');
      deleteId = null;
    });

    // ── Paginación ──
    document.getElementById('btnPrev').addEventListener('click', () => { if (page > 1) { page--; renderTable(); } });
    document.getElementById('btnNext').addEventListener('click', () => { page++; renderTable(); });

    // ── Búsqueda ──
    let searchTimeout;
    document.getElementById('searchInput').addEventListener('input', function() {
      clearTimeout(searchTimeout);
      searchTimeout = setTimeout(() => filterItems(this.value), 280);
    });

    // ── Tabs ──
    document.querySelectorAll('.type-btn').forEach(btn => {
      btn.addEventListener('click', () => setActiveTipo(btn.dataset.tipo));
    });

    // ── Init ──
    loadProducciones();
    setActiveTipo(currentTipo);
  </script>
</body>
</html>
