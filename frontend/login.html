<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineHub — Iniciar Sesión</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,700;1,300&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="login.css" />
</head>

<body>

  <!-- FONDO CINEMATOGRÁFICO -->
  <div class="bg-film">
    <div class="bg-overlay"></div>
    <div class="film-strip left">
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
    </div>
    <div class="film-strip right">
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
      <div class="frame"></div>
    </div>
  </div>

  <!-- LOGO NAVBAR -->
  <nav class="top-nav">
    <a href="index.html" class="nav-logo">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M4 4h3l2 4H4zm4 0h4l2 4h-4zm5 0h3l2 4h-3zM2 9h20v11a2 2 0 01-2 2H4a2 2 0 01-2-2V9zm10 3l-5 3v-6l5 3z" />
        </svg>
      </div>
      <span class="logo-text">Cine<span>Hub</span></span>
    </a>
  </nav>

  <!-- CONTENEDOR PRINCIPAL -->
  <main class="auth-container">

    <!-- PANEL DE BIENVENIDA (izquierda) -->
    <div class="welcome-panel">
      <div class="welcome-content">
        <div class="welcome-tag">BIENVENIDO DE VUELTA</div>
        <h2>Accede a recomendaciones personalizadas<br /><em>reseñas exclusivas</em><br />y la cartelera más completa de México</h2>
        <div class="role-preview">
          <div class="role-chip"> Aficionado</div>
          <div class="role-chip">Crítico</div>
          <div class="role-chip">Reportero</div>
          <div class="role-chip">Director</div>
        </div>
      </div>
      <div class="welcome-poster">
        <img src="https://images.unsplash.com/photo-1478720568477-152d9b164e26?w=600&q=80" alt="Cinema" />
        <div class="poster-grain"></div>
      </div>
    </div>

    <!-- PANEL DEL FORMULARIO (derecha) -->
    <div class="form-panel">

      <!-- TABS: Iniciar sesión / Registrarse -->
      <div class="auth-tabs">
        <button class="tab-btn active" data-tab="login">Iniciar sesión</button>
        <button class="tab-btn" data-tab="register">Crear cuenta</button>
      </div>

      <!-- ── FORMULARIO LOGIN ── -->
      <form class="auth-form" id="loginForm" novalidate>
        <div class="form-group">
          <label for="loginEmail">Correo electrónico</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input type="email" id="loginEmail" placeholder="tucorreo@ejemplo.com" autocomplete="email" />
          </div>
          <span class="field-error" id="loginEmailError"></span>
        </div>

        <div class="form-group">
          <label for="loginPassword">Contraseña</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="loginPassword" placeholder="Tu contraseña" autocomplete="current-password" />
            <button type="button" class="toggle-pwd" data-target="loginPassword">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="display:none">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
          <span class="field-error" id="loginPasswordError"></span>
        </div>

        <div class="form-footer-row">
          <label class="remember-me">
            <input type="checkbox" id="rememberMe" />
            <span class="checkbox-custom"></span>
            Recordarme
          </label>
          <a href="#" class="forgot-link">¿Olvidaste tu contraseña?</a>
        </div>

        <button type="submit" class="btn-submit" id="loginBtn">
          <span class="btn-text">Entrar</span>
          <div class="btn-loader" style="display:none">
            <div class="spinner"></div>
          </div>
        </button>

        <div class="auth-message" id="loginMessage"></div>

      </form>

      <!-- ── FORMULARIO REGISTRO ── -->
      <form class="auth-form hidden" id="registerForm" novalidate>

        <div class="form-row">
          <div class="form-group">
            <label for="regName">Nombre</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <input type="text" id="regName" placeholder="Tu nombre" />
            </div>
            <span class="field-error" id="regNameError"></span>
          </div>
          <div class="form-group">
            <label for="regLastName">Apellido</label>
            <div class="input-wrap">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              <input type="text" id="regLastName" placeholder="Tu apellido" />
            </div>
            <span class="field-error" id="regLastNameError"></span>
          </div>
        </div>

        <div class="form-group">
          <label for="regEmail">Correo electrónico</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z" />
              <polyline points="22,6 12,13 2,6" />
            </svg>
            <input type="email" id="regEmail" placeholder="tucorreo@ejemplo.com" autocomplete="email" />
            <div class="email-status" id="emailStatus"></div>
          </div>
          <span class="field-error" id="regEmailError"></span>
        </div>

        <div class="form-group">
          <label for="regPassword">Contraseña</label>
          <div class="input-wrap">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2" />
              <path d="M7 11V7a5 5 0 0 1 10 0v4" />
            </svg>
            <input type="password" id="regPassword" placeholder="Mínimo 8 caracteres" autocomplete="new-password" />
            <button type="button" class="toggle-pwd" data-target="regPassword">
              <svg class="eye-open" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                <circle cx="12" cy="12" r="3" />
              </svg>
              <svg class="eye-closed" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                style="display:none">
                <path
                  d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24" />
                <line x1="1" y1="1" x2="23" y2="23" />
              </svg>
            </button>
          </div>
          <div class="pwd-strength" id="pwdStrength">
            <div class="strength-bars">
              <div class="bar" id="bar1"></div>
              <div class="bar" id="bar2"></div>
              <div class="bar" id="bar3"></div>
              <div class="bar" id="bar4"></div>
            </div>
            <span class="strength-label" id="strengthLabel">Sin contraseña</span>
          </div>
          <span class="field-error" id="regPasswordError"></span>
        </div>

        <!-- SELECTOR DE ROL -->
        <div class="form-group">
          <label>Tu rol en CineHub</label>
          <div class="role-selector">
            <label class="role-card" data-role="aficionado">
              <input type="radio" name="userRole" value="aficionado" />
              <div class="role-card-inner">
                <span class="role-name">Aficionado</span>
                <span class="role-desc">Explora y califica películas</span>
              </div>
            </label>
            <label class="role-card" data-role="critico">
              <input type="radio" name="userRole" value="critico" />
              <div class="role-card-inner">
                <span class="role-name">Crítico</span>
                <span class="role-desc">Escribe reseñas y análisis</span>
              </div>
            </label>
            <label class="role-card" data-role="reportero">
              <input type="radio" name="userRole" value="reportero" />
              <div class="role-card-inner">
                <span class="role-name">Reportero</span>
                <span class="role-desc">Cubre estrenos y noticias</span>
              </div>
            </label>
            <label class="role-card" data-role="director">
              <input type="radio" name="userRole" value="director" />
              <div class="role-card-inner">
                <span class="role-name">Director</span>
                <span class="role-desc">Gestiona tus producciones</span>
              </div>
            </label>
          </div>
          <span class="field-error" id="regRoleError"></span>
        </div>

        <button type="submit" class="btn-submit" id="registerBtn">
          <span class="btn-text">Crear cuenta</span>
          <div class="btn-loader" style="display:none">
            <div class="spinner"></div>
          </div>
        </button>

        <div class="auth-message" id="registerMessage"></div>
      </form>

    </div>
  </main>

  <!-- MODAL DE ÉXITO -->
  <div class="success-modal" id="successModal">
    <div class="success-card">
      <h3 id="successTitle">¡Bienvenido!</h3>
      <p id="successDesc">Redirigiendo a tu panel...</p>
      <div class="progress-bar">
        <div class="progress-fill" id="progressFill"></div>
      </div>
    </div>
  </div>

  <script src="login.js"></script>
</body>

</html>
