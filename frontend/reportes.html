<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CineHub - Panel de Reportes</title>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;700&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="reportes.css">
  <style>
    /* Estilo para el estado de carga */
    .loading-state {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 400px;
      color: var(--text-muted);
    }

    .spinner {
      width: 40px;
      height: 40px;
      border: 4px solid rgba(229, 57, 53, 0.1);
      border-left-color: var(--red);
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-bottom: 15px;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }
  </style>
</head>

<body>

  <nav class="navbar">
    <div class="nav-brand">
      <div class="logo-icon">
        <svg viewBox="0 0 24 24">
          <path
            d="M4 4h3l2 4H4zm4 0h4l2 4h-4zm5 0h3l2 4h-3zM2 9h20v11a2 2 0 01-2 2H4a2 2 0 01-2-2V9zm10 3l-5 3v-6l5 3z" />
        </svg>
      </div>
      <span class="logo-text">Cine<span>Hub</span> Reportes</span>
    </div>
    <a href="index.html" class="btn-back">Volver al inicio</a>
  </nav>

  <main class="dashboard-container">
    <header class="dashboard-header">
      <div>
        <h1 class="title">Resultados de la Consulta</h1>
        <p class="subtitle">Visualización dinámica de datos desde PostgreSQL</p>
      </div>

      <div class="controls" style="flex-direction: column; width: 100%; max-width: 600px;">
        <div style="display: flex; gap: 12px; width: 100%;">
          <select id="reportSelector" class="report-selector" style="flex: 1;">
            <option value="">Selecciona un reporte...</option>
            <!-- <option value="1">Películas y sus Directores (JOIN)</option>
            <option value="2">Opiniones de Críticos por Película</option>
            <option value="3">Cartelera por Sucursal y Horarios</option>
            <option value="4">Reparto de Producciones Mexicanas</option> -->
            <option value="libre" style="font-weight: bold; color: var(--red);">Consulta SQL Libre</option>
          </select>
          <button id="runQueryBtn" class="btn-primary">Ejecutar</button>
        </div>

        <textarea id="sqlInput" placeholder="Escribe o pega aquí tu consulta SQL (ej. SELECT * FROM aficionado;)"
          style="display: none; width: 100%; height: 100px; margin-top: 15px; padding: 12px; background: var(--surface); color: var(--text); border: 1px solid var(--border); border-radius: 8px; font-family: monospace; resize: vertical;"></textarea>
      </div>
    </header>

    <div class="table-container">

      <div id="emptyState" class="empty-state">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
          <path stroke-linecap="round" stroke-linejoin="round"
            d="M4 7v10c0 2.21 3.582 4 8 4s8-1.79 8-4V7M4 7c0 2.21 3.582 4 8 4s8-1.79 8-4M4 7c0-2.21 3.582-4 8-4s8 1.79 8 4m0 5c0 2.21-3.582 4-8 4s-8-1.79-8-4" />
        </svg>
        <h3>Esperando selección...</h3>
        <p>Elige un reporte del menú superior para consultar la base de datos.</p>
      </div>

      <div id="loadingState" class="loading-state">
        <div class="spinner"></div>
        <p>Consultando a PostgreSQL...</p>
      </div>

      <div id="tableResult" style="display: none;"></div>

    </div>
  </main>

  <script>
    const reportSelector = document.getElementById('reportSelector');
    const runQueryBtn = document.getElementById('runQueryBtn');
    const emptyState = document.getElementById('emptyState');
    const loadingState = document.getElementById('loadingState');
    const tableResult = document.getElementById('tableResult');
    const sqlInput = document.getElementById('sqlInput');

    // Función para construir la tabla HTML basándose en los datos
    function renderTable(data) {
      if (!data || data.length === 0) {
        tableResult.innerHTML = `
          <div style="padding: 40px; text-align: center; color: var(--text-muted);">
            <p>No se encontraron registros para esta consulta.</p>
          </div>`;
        return;
      }

      const columns = Object.keys(data[0]);
      let html = '<table class="data-table"><thead><tr>';

      columns.forEach(col => {
        const label = col.replace(/_/g, ' ').replace(/\b\w/g, l => l.toUpperCase());
        html += `<th>${label}</th>`;
      });
      html += '</tr></thead><tbody>';

      data.forEach(row => {
        html += '<tr>';
        columns.forEach(col => {
          html += `<td>${row[col] !== null ? row[col] : '-'}</td>`;
        });
        html += '</tr>';
      });
      html += '</tbody></table>';

      tableResult.innerHTML = html;
    }

    // Mostrar u ocultar la caja de texto según el reporte elegido
    reportSelector.addEventListener('change', () => {
      if (reportSelector.value === 'libre') {
        sqlInput.style.display = 'block';
      } else {
        sqlInput.style.display = 'none';
      }
    });

    // Función principal para pedir datos a FastAPI
    async function fetchData() {
      const reportId = reportSelector.value;

      if (!reportId) {
        emptyState.style.display = 'flex';
        loadingState.style.display = 'none';
        tableResult.style.display = 'none';
        return;
      }

      emptyState.style.display = 'none';
      tableResult.style.display = 'none';
      loadingState.style.display = 'flex';

      try {
        let response;
        let data;

        if (reportId === 'libre') {
          // POST para la consulta libre
          const queryText = sqlInput.value.trim();
          if (!queryText) throw new Error("Escribe la consulta Sql antes de ejecutar.");

          response = await fetch(`http://localhost:8000/api/consulta-libre`, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ query: queryText })
          });
        } else {
          // GET para los reportes predefinidos
          response = await fetch(`http://localhost:8000/api/reportes/${reportId}`);
        }

        data = await response.json();

        // Si el backend nos mandó un error de sintaxis SQL, lo lanzamos para mostrarlo
        if (data && data.length > 0 && data[0].error_sql) {
          throw new Error(data[0].error_sql);
        }

        renderTable(data);
        loadingState.style.display = 'none';
        tableResult.style.display = 'block';

      } catch (error) {
        console.error("Error al ejecutar la consulta:", error);
        loadingState.style.display = 'none';
        tableResult.style.display = 'block';
        tableResult.innerHTML = `
          <div style="padding: 40px; text-align: center; color: var(--red);">
            <h3>Ocurrió un problema</h3>
            <p style="font-family: monospace; background: rgba(229,57,53,0.1); padding: 10px; border-radius: 8px; margin-top: 10px;">${error.message}</p>
          </div>`;
      }
    }

    // Eventos de los botones
    runQueryBtn.addEventListener('click', fetchData);
  </script>
</body>

</html>}
